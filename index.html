<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>M-CERN — A Resilient and United Mathare Community</title>
    <meta
      name="description"
      content="Mathare Community Emergency Response Network (M-CERN): grassroots disaster response, climate action, and community resilience in Nairobi's informal settlements."
    />
    <meta property="og:title" content="M-CERN — A Resilient and United Mathare" />
    <meta property="og:description" content="Community-led disaster preparedness, climate action, and emergency response across Nairobi's informal settlements." />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary_large_image" />

    <link rel="icon" type="image/png" href="/images/mcern-logo.png" />
    <link rel="apple-touch-icon" href="/images/mcern-logo.png" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@500;600;700;800&display=swap"
    />
  </head>
  <body>
    <div id="root"></div>

    <!--
      Hidden static form so Netlify's build-time bot detects the form and its
      fields (the real form is rendered by React and posts to this one).
      Only used when hosted on Netlify; ignored everywhere else.
    -->
    <form name="contact" data-netlify="true" netlify-honeypot="bot-field" hidden>
      <input type="text" name="name" />
      <input type="email" name="email" />
      <input type="tel" name="phone" />
      <input type="text" name="subject" />
      <textarea name="message"></textarea>
      <input type="text" name="bot-field" />
    </form>

    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>

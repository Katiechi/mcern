[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# SPA fallback. force is left false (default) so Netlify's form processor
# handles contact-form POSTs before this catch-all applies.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Long-cache hashed asset bundles.
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Long-cache static images.
[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Never cache the HTML shell.
[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
